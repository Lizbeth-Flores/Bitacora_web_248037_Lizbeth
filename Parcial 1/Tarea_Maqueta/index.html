<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea_Maqueta</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <div class="contenedor_grid">

        <header class="logo">
            <img src="recursos/logo.png" alt="Logotipo">
        </header>

        <div class="buscar">
            <input type="text">
        </div>

        <div class="idiomas">
            <p>Castel | Catal | Inglés</p>
        </div>

        <div class="redeSociales">
            <p>Facebook | Twitter | YouTube</p>
        </div>

        <nav class="menu">
            <table>
                <tr>
                    <td>HOME</td>
                    <td>FESTIVAL</td>
                    <td>C.C.</td>
                    <td>ACTUALID.</td>
                    <td>PROGR.</td>
                    <td>CONTACTO</td>
                </tr>
            </table>
        </nav>

        <div class="imagen">
            <img src="recursos/principal.png" alt="Imagen principal">
        </div>

        <div class="video">
            <video controls>
                <iframe src="https://www.youtube.com/embed/jRS7RHZhHRo?si=2IRFpPBABxwsKyce"
                    title="Noticias del 21 de enero de 2026" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </video>
        </div>

        <div class="crowdfunding">
            <p>CROWDFUNDING</p>
        </div>

        <div class="world">
            <p>BCCN WORLD</p>
        </div>

        <div class="noticia1">
            <img src="recursos/noticia1.webp" alt="Noticia 1">
        </div>

        <div class="noticia2">
            <img src="recursos/noticia2.webp" alt="Noticia 2">
        </div>

        <div class="noticia3">
            <img src="recursos/noticia3.webp" alt="Noticia 3">
        </div>

        <footer class="patrocinadores">
            <img src="recursos/p1.png" alt="Patrocinador 1">
            <img src="recursos/p2.png" alt="Patrocinador 2">
            <img src="recursos/p3.png" alt="Patrocinador 3">
        </footer>

    </div>

</body>

</html>
